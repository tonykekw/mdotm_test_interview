<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">

    <title>Save Pet</title>
</head>

<body>

    <div class="container">

        <h3>Pet Directory</h3>
        <hr>

        <p class="h4 mb-4">Save Pet</p>

        <form action="#" th:action="@{/pets/update}"
                         th:object="${petEntityDTO}" method="POST">

            <input type="hidden" th:field="*{id}" />

            <input type="text" th:field="*{name}"
                   class="form-control mb-4 w-25" placeholder="Name">

            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

            <input type="number" th:field="*{age}"
                   class="form-control mb-4 w-25" placeholder="Age">

            <p th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></p>

            <input type="text" th:field="*{ownerName}"
                   class="form-control mb-4 w-25" placeholder="Owner Name">

            <input type="text" th:field="*{species}"
                   class="form-control mb-4 w-25" placeholder="Species">

            <p th:if="${#fields.hasErrors('species')}" th:errors="*{species}"></p>

            <div th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>





            <button type="submit" class="btn btn-info col-2">Save</button>

        </form>

        <hr>
        <a th:href="@{/pets/list}">Back to Pets List</a>

    </div>


</body>

</html>
