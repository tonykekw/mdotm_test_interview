<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
		  integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
	<title>Pet Directory</title>
</head>

<body>
<div class="container my-4">
	<h3>Pet Directory</h3>
	<hr>

	<a th:href="@{/pets/showFormForAdd}" class="btn btn-primary btn-sm mb-3">
		Add Pet
	</a>

	<table class="table table-bordered table-striped">
		<thead class="table-dark">
		<tr>
			<th>Id</th>
			<th>Name</th>
			<th>Species</th>
			<th>Age</th>
			<th>Owner Name</th>
			<th>Actions</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="petEntityDTO : ${petEntityDTOs}">
			<td th:text="${petEntityDTO.id}"></td>
			<td th:text="${petEntityDTO.name}"></td>
			<td th:text="${petEntityDTO.species}"></td>
			<td th:text="${petEntityDTO.age}"></td>
			<td th:text="${petEntityDTO.ownerName}"></td>
			<td>
				<div class="d-flex gap-1">
					<form th:action="@{/pets/showFormForUpdate}" method="POST">
						<input type="hidden" name="petId" th:value="${petEntityDTO.id}" />
						<button type="submit" class="btn btn-info btn-sm">Update</button>
					</form>

					<form th:action="@{/pets/delete}" method="POST">
						<input type="hidden" name="petId" th:value="${petEntityDTO.id}" />
						<button type="submit" class="btn btn-danger btn-sm">Delete</button>
					</form>
				</div>
			</td>
		</tr>
		</tbody>
	</table>
</div>
</body>

</html>
